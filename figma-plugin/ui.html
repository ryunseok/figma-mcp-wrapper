<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Inter, system-ui, sans-serif; font-size: 12px; padding: 12px; background: #2c2c2c; color: #e0e0e0; }
    .header { font-size: 14px; font-weight: 600; margin-bottom: 12px; color: #fff; }
    .field { margin-bottom: 8px; }
    .field label { display: block; font-size: 11px; color: #999; margin-bottom: 4px; }
    .field input { width: 100%; padding: 6px 8px; border: 1px solid #444; border-radius: 4px; background: #1e1e1e; color: #e0e0e0; font-size: 12px; outline: none; }
    .field input:focus { border-color: #0d99ff; }
    .status { display: flex; align-items: center; gap: 6px; margin: 8px 0; font-size: 11px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot.connected { background: #1bc47d; }
    .dot.disconnected { background: #f24822; }
    .dot.connecting { background: #ffb020; }
    .channel-display { background: #1e1e1e; border: 1px solid #444; border-radius: 4px; padding: 8px; font-family: monospace; font-size: 16px; text-align: center; letter-spacing: 2px; color: #0d99ff; margin: 8px 0; user-select: all; }
    .log { background: #1e1e1e; border: 1px solid #333; border-radius: 4px; padding: 8px; font-family: monospace; font-size: 10px; max-height: 120px; overflow-y: auto; margin-top: 8px; color: #888; }
    .log .cmd { color: #0d99ff; }
    .log .err { color: #f24822; }
    .log .ok { color: #1bc47d; }
  </style>
</head>
<body>
  <div class="header">Figma MCP Wrapper</div>

  <div class="field">
    <label>Server</label>
    <input id="server" type="text" value="localhost" />
  </div>
  <div class="field">
    <label>Port</label>
    <input id="port" type="text" value="3055" />
  </div>

  <div class="status">
    <div id="statusDot" class="dot disconnected"></div>
    <span id="statusText">Disconnected</span>
  </div>

  <div class="channel-display" id="channelName">—</div>

  <div class="log" id="log"></div>

  <script>
    const serverInput = document.getElementById("server");
    const portInput = document.getElementById("port");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");
    const channelEl = document.getElementById("channelName");
    const logEl = document.getElementById("log");

    let ws = null;
    let channel = null;
    let reconnectTimer = null;

    function log(msg, cls = "") {
      const line = document.createElement("div");
      line.className = cls;
      line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function generateChannel() {
      return Math.random().toString(36).substring(2, 10);
    }

    function setStatus(state, text) {
      statusDot.className = `dot ${state}`;
      statusText.textContent = text;
    }

    function connect() {
      if (ws && ws.readyState === WebSocket.OPEN) return;

      const server = serverInput.value || "localhost";
      const port = portInput.value || "3055";
      const protocol = server === "localhost" || server === "127.0.0.1" ? "ws" : "wss";
      const url = `${protocol}://${server}:${port}`;

      setStatus("connecting", "Connecting...");
      log(`Connecting to ${url}...`);

      ws = new WebSocket(url);

      ws.onopen = () => {
        setStatus("connected", "Connected");
        log("Connected to relay", "ok");

        // Auto join channel
        channel = generateChannel();
        channelEl.textContent = channel;

        ws.send(JSON.stringify({
          type: "join",
          channel: channel,
          id: "join-" + Date.now(),
        }));
        log(`Joined channel: ${channel}`, "ok");
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);

          // System messages (join confirmations etc)
          if (data.type === "system") return;

          // Broadcast from MCP server — forward command to plugin code
          if (data.type === "broadcast" && data.message) {
            const cmd = data.message;
            if (cmd.command) {
              log(`← ${cmd.command}`, "cmd");
              parent.postMessage({ pluginMessage: cmd }, "*");
            }
          }
        } catch (e) {
          log(`Parse error: ${e.message}`, "err");
        }
      };

      ws.onclose = () => {
        setStatus("disconnected", "Disconnected");
        log("Disconnected");
        ws = null;
        scheduleReconnect();
      };

      ws.onerror = (err) => {
        log("Connection error", "err");
      };
    }

    function scheduleReconnect() {
      if (reconnectTimer) return;
      reconnectTimer = setTimeout(() => {
        reconnectTimer = null;
        connect();
      }, 3000);
    }

    // Receive results from plugin code → send back to MCP via WebSocket
    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg || !ws || ws.readyState !== WebSocket.OPEN) return;

      if (msg.type === "result") {
        ws.send(JSON.stringify({
          type: "message",
          channel: channel,
          message: {
            id: msg.id,
            result: msg.result,
            error: msg.error || null,
          },
        }));
        const status = msg.error ? "err" : "ok";
        log(`→ response ${msg.id.substring(0, 8)}...`, status);
      }

      if (msg.type === "progress_update") {
        ws.send(JSON.stringify({
          type: "message",
          channel: channel,
          message: msg,
        }));
      }
    };

    // Auto connect on load
    connect();

    // Reconnect on input change
    serverInput.addEventListener("change", () => { if (ws) ws.close(); connect(); });
    portInput.addEventListener("change", () => { if (ws) ws.close(); connect(); });
  </script>
</body>
</html>
